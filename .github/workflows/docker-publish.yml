name: Build & Push Docker Images

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/frigg-api:latest
          no-cache: true

      - name: Build & push web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.web
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/frigg-web:latest
          no-cache: true

      - name: Copy compose.yaml to Sleipnir
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: compose.yaml
          target: /var/lib/docker/volumes/docker_dockhand_data/_data/stacks/VPS/frigg/

      - name: Redeploy on Sleipnir
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN
          script: |
            set -e
            STACK=/var/lib/docker/volumes/docker_dockhand_data/_data/stacks/VPS/frigg
            mkdir -p "$STACK"
            cd "$STACK"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u skords83 --password-stdin
            docker compose pull
            docker compose up -d
            docker logout ghcr.io
